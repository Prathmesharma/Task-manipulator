<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Task Manager - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>TaskFlow</h1>
        <p>Manage your team's work effortlessly</p>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form active">
        <h2>Welcome Back</h2>
        <div class="input-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required placeholder="name@company.com">
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <div id="login-error" class="error-message"></div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        <p class="toggle-text">Don't have an account? <a href="#" id="show-register">Create one</a></p>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form hidden">
        <h2>Create Account</h2>
        <div class="input-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" required placeholder="John Doe">
        </div>
        <div class="input-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" required placeholder="name@company.com">
        </div>
        <div class="input-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" required placeholder="••••••••">
        </div>
        <div class="input-group">
          <label for="reg-role">Role</label>
          <select id="reg-role">
            <option value="Member">Member</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <div id="register-error" class="error-message"></div>
        <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
        <p class="toggle-text">Already have an account? <a href="#" id="show-login">Sign in</a></p>
      </form>

    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
